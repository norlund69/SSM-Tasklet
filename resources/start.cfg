<?xml version="1.0" encoding="utf-8"?>
<start xmlns="http://schemas.taskletfactory.com/MobileWMS/Start"
 xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
 xsi:schemaLocation="http://schemas.taskletfactory.com/MobileWMS/Start http://schemas.taskletfactory.com/MobileWMS/Start.xsd"
 language="en" screenOrientation="Portrait" twoDigitYearMax="2099">
 
  <!-- PROTOCOLS -->
  <protocols>
    <protocol id="classic" barcodeSeparator=";" decimalSeparator="." expirationDateSeparator="," ignoreCertificateErrors="false"/>
  </protocols>

  <!-- ENDPOINTS -->
  <endpoints>
    <endpoint id="get2insights_SSM-TEST" displayName="get2insights: SSM-TEST" protocol="classic" type="D365BC" address="https://api.businesscentral.dynamics.com/v2.0/8bd6fd22-a319-4a8c-8d02-2c846008e030/TaskletFactory/WS/SSM-TEST/Codeunit/MobileDocumentService">
      <azureConfiguration authority="https://login.microsoftonline.com/8bd6fd22-a319-4a8c-8d02-2c846008e030/oauth2/authorize" scopes="https://api.businesscentral.dynamics.com/user_impersonation" clientId="c362a0b9-4316-4cd7-aa6e-2967837137dc" returnUri="https://businesscentral.dynamics.com/"/>
    </endpoint>
  </endpoints>

  <!-- SCANNER -->
  <scanner>
    <type>internal</type>
    <gs1Support enabled="true">
      <code128 enabled="true">
        <fnc1AsciiNumber>29</fnc1AsciiNumber>
        <startSequence>]C1</startSequence>
      </code128>
      <dataMatrix enabled="true">
        <fnc1AsciiNumber>29</fnc1AsciiNumber>
        <startSequence>]d2</startSequence>
      </dataMatrix>
    </gs1Support>
    <scanEngineProperties>      
      <scanEngineProperty key="DEC_EAN13_CHECK_DIGIT_TRANSMIT" value="true"/>
      <scanEngineProperty key="DEC_UPCA_CHECK_DIGIT_TRANSMIT" value="true"/>
   <scanEngineProperty key="DEC_WINDOW_MODE" value="true" />
    </scanEngineProperties>
  </scanner>
  
  <!-- CAMERA SCANNER -->
  <!--<cameraScanner licenseKey=""/>-->

  <!-- FEEDBACK -->
  <feedbackConfiguration>
    <feedback on="Attention" sound="Attention" vibrate="false"/>
    <feedback on="Error" sound="Error" vibrate="false"/>
    <!-- <feedback on="Notification" sound="Notification" vibrate="false"/>
    <feedback on="Success" sound="Success" vibrate="false"/> -->
  </feedbackConfiguration>

  <!-- LOGIN PAGE -->
  <loginPage>
    <title defaultValue="Mobile WMS" />
    <loginConfiguration>
      <onLogin>
        <navigateTo id="MainMenu" />
      </onLogin>
      <credentials enabled="true" username="" password="" domain="" hideDomain="true">
        <scan enabled="true" allowScanDomain="true" allowScanPassword="true" allowScanUserName="true" allowScanEndpoint="true">
          <gs1 enabled="true" />
        </scan>
      </credentials>
    </loginConfiguration>
  </loginPage>
 
</start>
